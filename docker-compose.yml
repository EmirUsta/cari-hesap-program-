version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: pos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/pos_db
    depends_on:
      - db
    volumes:
      # Optional: bind mount the backend directory for live-reload during local dev
      - ./backend:/app

  admin_panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: react_admin_panel
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./admin-panel:/app
      - /app/node_modules

  pos_panel:
    build:
      context: ./pos-panel
      dockerfile: Dockerfile
    container_name: react_pos_panel
    ports:
      - "5174:5174"
    depends_on:
      - api
    volumes:
      - ./pos-panel:/app
      - /app/node_modules

volumes:
  postgres_data:
